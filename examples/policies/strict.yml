# Strict policy — production environments
# Blocks all admin tools, limits write access, requires clean security scan.

deny:
  categories:
    - admin
    - write
  descriptions:
    - "*ssh*"
    - "*credentials*"
    - "*IMPORTANT*"
    - "*GOD MODE*"

require:
  aguara: clean
  maxTools: 15
  maxFindings:
    critical: 0
    high: 0
